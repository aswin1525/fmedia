spring.application.name=platform
server.port=8081

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/problemshare}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# AI Configuration
ai.api.key=${AI_API_KEY}
ai.api.url=https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
ai.api.model=gemini-2.5-flash
